<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Nomad Tracker{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sh: {
              bg:     '#07090f',
              panel:  '#0d1220',
              card:   '#101828',
              border: '#1e2d45',
              gold:   '#c9a84c',
              'gold-dim': '#8a6f2e',
              teal:   '#00c8c8',
              red:    '#ff3a5c',
              text:   '#d4cdbf',
              muted:  '#5a6a82',
            }
          },
          fontFamily: {
            sans: ['"Inter"', 'system-ui', 'sans-serif'],
            display: ['"Cormorant Garamond"', 'Georgia', 'serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body { background-color: #07090f; }

    /* Art Deco geometric background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .page-wrap { position: relative; z-index: 1; }

    /* Gold glow on hover cards */
    .country-card {
      transition: all 0.25s ease;
      border: 1px solid #1e2d45;
    }
    .country-card:hover {
      border-color: rgba(201,168,76,0.35);
      box-shadow: 0 0 24px rgba(201,168,76,0.07), inset 0 0 24px rgba(201,168,76,0.03);
      transform: translateY(-1px);
    }

    /* Severity left-border */
    .sev-ok      { border-left: 3px solid #00c8c8; }
    .sev-info    { border-left: 3px solid #4a9eff; }
    .sev-warning { border-left: 3px solid #c9a84c; }
    .sev-urgent  { border-left: 3px solid #ff3a5c; box-shadow: -4px 0 12px rgba(255,58,92,0.2); }
    .sev-unknown { border-left: 3px solid #2a3a52; }

    /* Art Deco section divider */
    .art-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #8a6f2e;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .art-divider::before, .art-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, #8a6f2e55, transparent);
    }

    /* Gold shimmer badge */
    .badge-gold {
      background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
      border: 1px solid rgba(201,168,76,0.3);
      color: #c9a84c;
    }

    /* Teal glow indicator */
    .dot-teal  { width:7px; height:7px; border-radius:50%; background:#00c8c8; box-shadow: 0 0 8px #00c8c8; }
    .dot-gold  { width:7px; height:7px; border-radius:50%; background:#c9a84c; box-shadow: 0 0 8px #c9a84c; }
    .dot-red   { width:7px; height:7px; border-radius:50%; background:#ff3a5c; box-shadow: 0 0 8px #ff3a5c; animation: pulse-red 1.5s infinite; }
    .dot-blue  { width:7px; height:7px; border-radius:50%; background:#4a9eff; box-shadow: 0 0 8px #4a9eff; }
    .dot-dim   { width:7px; height:7px; border-radius:50%; background:#2a3a52; }

    @keyframes pulse-red {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px #ff3a5c; }
      50%       { opacity: 0.5; box-shadow: 0 0 2px #ff3a5c; }
    }

    /* Navbar gold underline on active */
    .nav-active { color: #c9a84c !important; }
    .nav-active::after {
      content: '';
      display: block;
      height: 1px;
      background: #c9a84c;
      margin-top: 2px;
      box-shadow: 0 0 6px #c9a84c;
    }

    /* Primary button */
    .btn-primary {
      background: linear-gradient(135deg, #c9a84c, #a07d30);
      color: #07090f;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #dbb85c, #b08d3a);
      box-shadow: 0 0 16px rgba(201,168,76,0.35);
    }

    /* Secondary button */
    .btn-secondary {
      background: transparent;
      border: 1px solid #1e2d45;
      color: #5a6a82;
      transition: all 0.2s;
    }
    .btn-secondary:hover {
      border-color: rgba(201,168,76,0.4);
      color: #c9a84c;
    }

    /* Input fields */
    .sh-input {
      background: #07090f;
      border: 1px solid #1e2d45;
      color: #d4cdbf;
      transition: border-color 0.2s;
    }
    .sh-input:focus {
      outline: none;
      border-color: rgba(201,168,76,0.5);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.06);
    }
    .sh-input::placeholder { color: #2a3a52; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #07090f; }
    ::-webkit-scrollbar-thumb { background: #1e2d45; border-radius: 2px; }
  </style>
</head>
<body class="text-sh-text min-h-screen">
<div class="page-wrap">

  <!-- Navigation -->
  <nav style="background:#0d1220; border-bottom: 1px solid #1e2d45;">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <!-- Art Deco logo mark -->
        <div style="width:28px;height:28px;border:1px solid rgba(201,168,76,0.6);transform:rotate(45deg);display:flex;align-items:center;justify-content:center;">
          <div style="width:10px;height:10px;background:#c9a84c;transform:rotate(0deg);"></div>
        </div>
        <span style="font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:600;color:#c9a84c;letter-spacing:0.08em;">
          NOMAD TRACKER
        </span>
      </div>

      <div class="flex items-center gap-8">
        <a href="/" class="text-xs tracking-widest uppercase transition-colors
          {% if request.url.path == '/' %}nav-active text-sh-gold{% else %}text-sh-muted hover:text-sh-text{% endif %}">
          Дашборд
        </a>
        <a href="/alerts" class="text-xs tracking-widest uppercase transition-colors
          {% if '/alerts' in request.url.path %}nav-active text-sh-gold{% else %}text-sh-muted hover:text-sh-text{% endif %}">
          Алерты
        </a>
        <a href="/settings" class="text-xs tracking-widest uppercase transition-colors
          {% if '/settings' in request.url.path %}nav-active text-sh-gold{% else %}text-sh-muted hover:text-sh-text{% endif %}">
          Настройки
        </a>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-6 py-10">
    {% block content %}{% endblock %}
  </main>

</div>
</body>
</html>
