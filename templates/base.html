<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Nomad Tracker{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f2ede4;
      --black:   #0a0a0a;
      --white:   #f2ede4;
      --yellow:  #BF5AF2;
      --red:     #ff2b2b;
      --gray:    #d6d0c7;
      --border:  2px solid #0a0a0a;
      --shadow:  4px 4px 0px #0a0a0a;
      --shadow-sm: 3px 3px 0px #0a0a0a;
    }

    html { background: var(--bg); }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--black);
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    /* NAV */
    nav {
      border-bottom: var(--border);
      background: var(--black);
      color: var(--white);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-logo {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--yellow);
    }

    .nav-links { display: flex; gap: 32px; }

    .nav-link {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(242,237,228,0.5);
      transition: color 0.15s;
    }
    .nav-link:hover { color: var(--white); }
    .nav-link.active { color: var(--yellow); }

    /* LAYOUT */
    main { max-width: 1080px; margin: 0 auto; padding: 48px 32px; }

    /* PAGE TITLE */
    .page-title {
      font-family: 'Space Mono', monospace;
      font-size: 36px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      line-height: 1;
      margin-bottom: 4px;
    }
    .page-sub {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 40px;
    }

    /* CARD */
    .card {
      border: var(--border);
      background: var(--bg);
      padding: 20px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .card:hover {
      box-shadow: 6px 6px 0px var(--black);
      transform: translate(-1px, -1px);
    }

    /* STAT CARD */
    .stat-card {
      border: var(--border);
      background: var(--black);
      color: var(--white);
      padding: 20px 24px;
    }
    .stat-number {
      font-family: 'Space Mono', monospace;
      font-size: 40px;
      font-weight: 700;
      line-height: 1;
    }
    .stat-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(242,237,228,0.4);
      margin-top: 6px;
    }
    .stat-card.accent { background: var(--black); border-left: 5px solid var(--yellow); }
    .stat-card.accent .stat-number { color: var(--yellow); }
    .stat-card.accent .stat-label { color: rgba(255,255,255,0.4); }

    /* SEVERITY BADGE */
    .badge {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 3px 8px;
      border: 1.5px solid var(--black);
    }
    .badge-ok      { background: transparent; color: var(--black); }
    .badge-info    { background: var(--black); color: var(--white); }
    .badge-warning { background: var(--yellow); color: #fff; }
    .badge-urgent  { background: var(--red); color: var(--white); border-color: var(--red); }
    .badge-unknown { background: var(--gray); color: #888; border-color: var(--gray); }

    /* SECTION HEADER */
    .section-header {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #888;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .section-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #ccc;
    }

    /* BUTTON */
    .btn {
      display: inline-block;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px 20px;
      border: var(--border);
      background: var(--black);
      color: var(--white);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.1s, transform 0.1s;
    }
    .btn:hover {
      box-shadow: none;
      transform: translate(3px, 3px);
    }
    .btn-outline {
      background: transparent;
      color: var(--black);
    }
    .btn-outline:hover { background: var(--gray); }

    /* INPUT */
    .input {
      width: 100%;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      padding: 10px 14px;
      border: var(--border);
      background: var(--white);
      color: var(--black);
      outline: none;
      transition: box-shadow 0.15s;
    }
    .input:focus { box-shadow: var(--shadow-sm); }
    .input::placeholder { color: #bbb; }

    .select {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      padding: 10px 14px;
      border: var(--border);
      background: var(--white);
      color: var(--black);
      outline: none;
      appearance: none;
      cursor: pointer;
    }

    /* LABEL */
    .label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
    }

    /* ALERT BANNER */
    .alert-banner {
      border: var(--border);
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      margin-bottom: 24px;
    }
    .alert-banner.ok      { background: #e8f5e9; }
    .alert-banner.error   { background: #ffeaea; }
    .alert-banner.info    { background: #fff8d6; }

    /* DIVIDER */
    hr { border: none; border-top: 1px solid #ccc; margin: 24px 0; }

    /* MONO */
    .mono { font-family: 'Space Mono', monospace; }

    /* GRID UTILS */
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    @media (max-width: 768px) {
      .grid-3 { grid-template-columns: 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
    }

    /* COUNTRY CARD specific */
    .country-card { position: relative; }
    .country-flag { font-size: 28px; line-height: 1; margin-bottom: 12px; display: block; }
    .country-name { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .country-status { font-size: 12px; color: #555; line-height: 1.5; min-height: 36px; margin-bottom: 12px; }
    .country-date { font-family: 'Space Mono', monospace; font-size: 10px; color: #aaa; }

    .sev-warning { border-top: 4px solid var(--yellow); }
    .sev-urgent  { border-top: 4px solid var(--red); }
    .sev-info    { border-top: 4px solid var(--black); }
    .sev-ok      { border-top: 4px solid transparent; }
    .sev-unknown { border-top: 4px solid var(--gray); }
  </style>
</head>
<body>

<nav>
  <span class="nav-logo">// Nomad Tracker</span>
  <div class="nav-links">
    <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Дашборд</a>
    <a href="/alerts" class="nav-link {% if '/alerts' in request.url.path %}active{% endif %}">Алерты</a>
    <a href="/settings" class="nav-link {% if '/settings' in request.url.path %}active{% endif %}">Настройки</a>
  </div>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

</body>
</html>
